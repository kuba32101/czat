<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Czat</title>
	<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
	<style>
		body {font-family: sans-serif; text-align: center; margin: 20px;}
		textarea {width: 100%; height: 200px; font-size: 16px;}
		.info {margin-top: 10px; color: #666; font-size: 14px;}
		#tu {
			white-space: pre-line;
			max-height: 300px;
			overflow-y: auto;
			text-align: left;
			border: 1px solid black;
			padding: 5px;
			margin-top: 10px;
		}
	</style>
</head>
<body>
	<h1>"Czat"</h1>
	<textarea id="sharedText" placeholder='pisz na "Czat"'></textarea><br>
	<input type="text" id="Nazwa">
	<button id="sendBtn">Wyślij</button>
	<div class="info">
		Każdy, kto wejdzie tu widzi ten sam tekst.
	</div><br>
	<div id="tu"></div>

	<script>
		const textarea = document.getElementById('sharedText');
		const sendBtn = document.getElementById('sendBtn');
		const outputSpan = document.getElementById('tu');
		const inp = document.getElementById("Nazwa");
		const dziwk = new Audio("/static/notification-457196.mp3");

		const socket = io();

		socket.on('connect', () => {
			console.log('Połączono z Socket.IO');
		});

		socket.on('connect_error', (err) => {
			console.error('Błąd połączenia:', err);
		});
		
		socket.on('update_history', (data) => {
			outputSpan.textContent += data.inp + ": "+ data.text + "\n";
			dziwk.currentTime = 0;
			dziwk.play();
			outputSpan.scrollTo({
				top: outputSpan.scrollHeight,
				behavior: "smooth"
			});
		});
		/*socket.on('update_text', (text) => {
			if (text === "" || inp === "") {alert("Wpisz nazwę/wiadomość"); return;} else{ 
			console.log('update_text z serwera:', text);
			outputSpan.textContent += inp.value + ": " + text + "\n";
			}
		});*/

		sendBtn.addEventListener('click', () => {
			if (!inp.value.trim() || !textarea.value.trim()) {
				alert("Wpisz coś");
				return;
			}
			const text = textarea.value;
			console.log('wysyłam text_changed:', text);
			socket.emit('update_text', {inp: inp.value, text: textarea.value});
			textarea.value = '';
		});
	</script>
</body>
</html>
